components:
  schemas:
  # Order Entry schemas
    Orders:
      type: object
      properties:
        id:
          type: string
          example: 001/KMA/25
        company:
          type: string
          example: ZENBU
        po_number:
          type: string
          example: P0012345
        date:
          type: string
          format: date
          example: 2025-01-01
    Items:
      type: object
      properties:
        id:
          type: string
          example: 001/KMA/25
        order_id:
          type: string
          example: 001/KMA/25
        item_name:
          type: string
          example: APRON FULL
        size:
          type: string
          example: S
        amount:
          type: integer
          format: int64
          example: 12
        price:
          type: integer
          format: int64
          example: 75000
        subtotal:
          type: integer
          format: int64
          example: 900000
    Order_recap:
      type: object
      properties:
        id:
          type: string
          example: 001/KMA/25
        total:
          type: integer
          format: int64
          example: 900000
        down_payment:
          type : integer
          format: int64
          example: 450000
        discount:
          type: integer
          format: int64
          example: 100000
        remaining:
          type: integer
          format: int64
          example: 350000
        ar_receivable:
          type: integer
          format: int64
          example: 900000
  # Delivery Entry schemas
    Delivery:
      type: object
      properties:
        id:
          type: string
          example: 001/KMA/25
        address:
          type: string
          example: hayam wuruk yello
        po_number:
          type: string
          example: P00012345
        phone_number:
          type: string
          example: 081219208887
        contact_person:
          type: string
          example: Bu Tuti
        date:
          type: string
          format: date
          example: 2025-01-01
    Surat_jalan:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 01
        delivery_id:
          type: string
          example: 001/KMA/25
        delivery_items:
          type: array
          items:
            type: string
          example: ["Apron full"]
        size:
          type: array
          items:
            type: string
          example: ["S", "M", "L"]
        amount:
          type: integer
          format: int64
          example: 12
    Delivery_order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 01
        delivery_id:
          type: string
          example: 01/SJ/25
        item_name:
          type: string
          example: Apron full
        size:
          type: string
          example: S
        amount:
          type: integer
          format: int64
          example: 12
  # Production Entry schemas
    Supplier:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        supplier_name:
          type: string
          example: SAI
        supplier_category:
          type: string
          enum:
            - sablon
            - embroidery
            - merchandise_supplier
            - uniform_supplier
            - general_supplier
          example: sablon
    Production:
      type: object
      properties:
        id:
          type: string
          example: 01/KB/26
        description:
          type: string
          example: Lorem Ipsum
        supplier_id:
          type: integer
          format: int64
          example: 1 
        material_name:
          type: string
          example: 101
        price:
          type: integer
          format: int64
          example: 750000
        si_unit:
          type: string
          example: yard
        amount:
          type: integer
          format: int64
          example: 12
    Operations:
      type: object
      properties:
        id: 
          type: string 
          example: 01/KB/26
        description:
          type: string
          example: Lorem Ipsum
        price:
          type: integer
          format: int64
          example: 1


            
        
    
          


