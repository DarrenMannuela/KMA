    post:
      tags:
        - Supplier Entry
      summary: POST a new supplier
      requestBody: 
        required: true
        content:
          application/json: 
            schema:
              $ref: '#/components/schemas/Supplier'
      responses:
        '201':
          description: Supplier created successfully
          content:
