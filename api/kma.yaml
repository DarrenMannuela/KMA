              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Surat_jalan'
        '404':
          description: Not Found
    post:
      tags:
        - Order Entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Surat_jalan'
      responses:
        '201':
          description: Surat Jalan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Surat_jalan'
        '400':
          description: Invalid input
          
  # CRUD of Order Recap schema
