          description: Order-recap ID to be changed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order_recap'
      responses:
        '200':
          description: Order-recap entry successfully updated
        '404':
          description: Order-recap entry not found
    patch:
      tags:
        - Order Entry
      summary: Update a specific part of a order-recap entry based on its ID
      description: Change or update a specific part order-recap entry based on ID 
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Order-recap ID to be changed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order_recap'
      responses:
        '200':
          description: Order-recap entry successfully updated
        '404':
          description: Order-recap entry not found
    delete:
      tags:
        - Order Entry
      summary: DELETE specific order-recap entry based on its ID
      description: DELETE any order-recap entry based on ID 
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Order-recap ID to be changed
      responses:
        '200':
          description: Order-recap entry successfully DELETED
        '404':
          description: Order-recap entry not found
          
  # CRUD of Delivery schema
  /delivery:
    get:
      tags:
      - Delivery Entry
      summary: Find all delivery
