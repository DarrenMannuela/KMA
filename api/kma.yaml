openapi: 3.0.4
info:
  title: KMA - OpenAPI 3.0
  description: KMA main API
  termsOfService: https://swagger.io/terms/
  contact:
    email: darren.mannuela@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.12
externalDocs:
  description: Find out more about Swagger
  url: https://swagger.io
servers:
  - url: http://localhost:8000/api/v1
tags:
  - name: Order Entry
    description: Entire workflow of order entry
  - name: Delivery Entry
    description: Entire workflow of delivery entry
  - name: Supplier Entry
    description: Entire workflow of supplier entry
  - name: Production Entry
    description: Entire workflow of production entry
  - name: Operation Entry
    description: Entire workflow of operation entry
paths:

  # CRUD of Orders schema
  /order:
    get:
      tags:
        - Order Entry
      summary: Finds all the orders
      description: GETs all the orders 
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Orders'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Orders'
        '404':
          description: Not Found
    post:
      tags: 
        - Order Entry
      summary: Post an order
      description: POST an order into the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Orders'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orders'
        '400':
          description: Invalid input
  /order/{id}:
      put:
        tags:
          - Order Entry
        summary: Update a specific order entry based on its ID
        description: Change or update any order entry based on ID 
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: string
            description: Order ID to be changed
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orders'
        responses:
          '200':
            description: Order entry successfully updated
          '404':
            description: Order entry not found
      patch: 
        tags: 
          - Order Entry
        summary: Update a specific portion of an entry
        description: Change or update any portion of a order entry based on ID
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: string
            description: Order ID to be changed
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orders'
        responses:
          '200':
            description: Order entry successfully updated
          '404':
            description: Order entry not found
      delete:
        tags: 
          - Order Entry
        summary: Deleting a specific order entry based on ID
        description: Deleting an order entry
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: string
            description: Order Id to be deleted
        responses:
          '200':
            description: Order entry has been deleted
          '404':
            description: Order entry not found
 
  # CRUD of Items schema            
  /items:
    get:
      tags: 
        - Order Entry
      summary: Finds all the orders
