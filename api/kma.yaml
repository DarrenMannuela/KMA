    post:
      tags: 
        - Order Entry
      summary: Post an item
      description: POST item into the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Items'
      responses:
        '201':
          description: Items created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
        '400':
          description: Invalid input
  /items/{id}:
    put:
      tags:
        - Order Entry
      summary: Update a specific item entry based on ID
      description: Change or update any item entry based on ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID to be changed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Items'
      responses:
          '200':
            description: Item entry successfully updated
          '404':
            description: Item entry not found
    patch:
      tags:
        - Order Entry
      summary: Update a specific item entry based on ID
      description: Change or update any item entry based on ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Item ID to be changed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Items'
      responses:
          '200':
            description: Item entry successfully updated
          '404':
            description: Item entry not found
    delete:
      tags: 
        - Order Entry
      summary: Deleting a specific item entry based on ID
      description: Deleting an item entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Item Id to be deleted
      responses:
        '200':
          description: Item entry has been deleted
        '404':
          description: Item entry not found
  /surat-jalan:
    get:
      tags:
        - Order Entry
      summary: Make Surat Jalan for a specific Order Recap
      description: Making a Surat Jalan for Order
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Surat_jalan'
