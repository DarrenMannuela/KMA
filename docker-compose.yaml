services:
  sqlite-db:
    image: alpine:latest
    container_name: kma_sqlite_server
    restart: unless-stopped
    volumes:
      - ./db_data:/db
    working_dir: /db
    stdin_open: true
    tty: true
    command: >
      /bin/sh -c "
      apk add --no-cache sqlite &&
      touch /db/kma.sqlite &&
      tail -f /dev/null"
    networks:
      - kma_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kma_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./db_data:/app/db_data
    depends_on:
      - sqlite-db
    networks:
      - kma_network

networks:
  kma_network:
    name: kma_network
