services:
  sqlite-db:
    image: alpine:latest
    container_name: kma_sqlite_server
    # Ensures the container restarts if the Docker daemon restarts
    restart: unless-stopped
    volumes:
      - ./db_data:/db
    working_dir: /db
    stdin_open: true 
    tty: true
    # Installs sqlite, creates a dummy DB if it doesn't exist, then keeps the process alive
    command: >
      /bin/sh -c "
      apk add --no-cache sqlite &&
      touch /db/kma.sqlite &&
      tail -f /dev/null"